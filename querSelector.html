<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>querySelector</title>
</head>
<body>
    
    <!-- Using querySelector -->

    <!-- <h1 id="heading1">Welcome</h1>
    <h1 id="heading2">Good Morning</h1>

    <script>
        document.querySelector("#heading1").style.color="red";
        document.querySelector("#heading2").style.color="green";
    </script> -->

    <!-- Using QuerySelectorAll -->

    <h1 id="heading1">Welcome</h1>
    <h1 id="heading2">Good Morning</h1>

    <script>
        let data = document.querySelectorAll("h1");
        // document.write(data.length)

        data.forEach((d)=>{
            d.style.color="green";
        })
    </script>
</body>
