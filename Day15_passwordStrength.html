<!-- 3) Write a program to check the strength of a password entered by the user.
 The password should be considered strong only if it contains at least 8 
 characters, one uppercase letter, one lowercase letter, one number, and 
 one special character. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label for="pass"></label>
    <input type="password" name="" id="pass" placeholder="enter password...">
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>


    <script>
        let inp = document.querySelector("#pass");
        let p1 = document.querySelector("#p1");
        let p2 = document.querySelector("#p2");
        let p3 = document.querySelector("#p3");
        let p4 = document.querySelector("#p4");
        let p5 = document.querySelector("#p5");

        

        inp.addEventListener("keyup", () => {
            let password = inp.value.trim().replaceAll(" ", "");
            console.log(password);
            let count = password.length;
            let uppercaseRegex = /[A-Z]/;
            let lowercaseRegex = /[a-z]/;
            let digitRegex = /[0-9]/;
            let specialRegex = /[^0-9A-Za-z]/;

            if (count >= 8) {
                p1.innerText = "total 8 characters";
                p1.style.color = "green";
            }
            else {
                p1.innerText = "total 8 characters required";
                p1.style.color = "red";
            }
            count++;

            if (uppercaseRegex.test(password)) {
                p2.innerText = "added 1 uppercase character";
                p2.style.color = "green";
            }
            else {
                p2.innerText = "at least 1 uppercase character required";
                p2.style.color = "red";
            }

            if (lowercaseRegex.test(password)) {
                p3.innerText = "added 1 lowercase character";
                p3.style.color = "green";
            }
            else {
                p3.innerText = "at least 1 lowercase character required";
                p3.style.color = "red";
            }

            if (digitRegex.test(password)) {
                p4.innerText = "added 1 digit";
                p4.style.color = "green";
            }
            else {
                p4.innerText = "at least 1 digit required";
                p4.style.color = "red";
            }

            if (specialRegex.test(password)) {
                p5.innerText = "added 1 special character";
                p5.style.color = "green";
            }
            else {
                p5.innerText = "at least 1 special character required";
                p5.style.color = "red";
            }

        })
    </script>
</body>

</html>
