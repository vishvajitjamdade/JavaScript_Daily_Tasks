<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form name="form1">
        <input type="number" placeholder="Enter num1..." id="num1"> <br><br>
        <input type="number" placeholder="Enter num2..." id="num2"> <br><br>
        <button type="button" onclick="addition()">Submit</button>
    </form>

    <script>
        function addition() {
            var n1 = Number(document.getElementById("num1").value);
            var n2 = Number(document.getElementById("num2").value);

            var result = n1 + n2;
            document.writeln("Addition : " + result);
        }
    </script>
</body>

</html>
