<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form action="xyz">
        <label for="name">Name : </label>
        <input type="text" name="name" id="name" placeholder="enter your name..." required><br>
        <span id="msgName"></span><br><br>

        <label for="email">email : </label>
        <input type="email" name="email" id="email" placeholder="enter email..." required><br><br>

        <label for="mobile">contact no.</label>
        <input type="number" name="mobile" id="mobile" placeholder="enter mobile number..." required><br>
        <span id="msgMobile">sdf</span><br><br>

        <button>Submit</button>
    </form>

    <script>
        let nameInp = document.querySelector("#name");
        let emailInp = document.querySelector("#email");
        let mobileInp = document.querySelector("#mobile");

        let nameRegex = /^[a-zA-Z]{2,20}$/;
        let mobileRegex = /^[0-9]{10}$/;

        let msgName = document.querySelector("#msgName");
        let msgMobile = document.querySelector("#msgMobile");

        nameInp.addEventListener("input", () => {
            let value = nameInp.value.trim();

            if (nameRegex.test(value)) {
                msgName.innerText = "Valid Name";
                msgName.style.color = "green";
            }
            else {
                msgName.innerText = "Enter valid name (2-20 letters)";
                msgName.style.color = "red";
            }
        });

        mobileInp.addEventListener("input", () => {
            let value = mobileInp.value.trim();

            if (mobileRegex.test(value)) {
                msgMobile.innerText = "valid mobile";
                msgMobile.style.color = "green";
            }
            else {
                msgMobile.innerText = "Enter 10 digit number";
                msgMobile.style.color = "red";
            }
        });

    </script>
</body>

</html>
