<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button type="button" onclick="checkPassword()">LogIn</button>

    <script>
        function checkPassword() {
            let maxAttempt = 3;
            let count = 0;
            let setPassword = "vish@123";
            let isLogged = false;

            do {
                let password = prompt("Enter the password : ");
                if (password === setPassword) {
                    alert("Password is correct! You logged In");
                    isLogged = true;
                    break;
                }
                else {
                    count++;
                    alert("Password is incorrect! Remaining attempts are : " + (maxAttempt - count));
                }
            } while (count < maxAttempt);
            if (!isLogged) {
                alert("YOUR ACCOUNT IS BLOCKED!");
            }
        }
    </script>
</body>

</html>
